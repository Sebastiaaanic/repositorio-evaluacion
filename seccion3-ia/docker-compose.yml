version: '3.8'
services:
  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql_db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "pruebaProintel2026"
      MSSQL_INSTANCE_NAME: "SQLDEV"
    ports:
      - "1435:1433"
    volumes:
      - sql-data:/var/opt/mssql
    restart: unless-stopped
    networks:
      - red-api
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'pruebaProintel2026' -No -Q 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  api-node:
    build:
      context: ./api-tareas 
      dockerfile: Dockerfile
    container_name: api_node
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: development
      DB_USER: sa
      DB_PASSWORD: pruebaProintel2026
      DB_HOST: sql-server
      DB_NAME: EVA_PROINTEL
      DB_PORT: 1433
    depends_on:
      sql-server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - red-api

volumes:
  sql-data:

networks:
  red-api: